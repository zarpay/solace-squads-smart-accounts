plugins:
  - rubocop-yard

YARD:
  Enabled: true

AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  Exclude:
    - 'solace-squads-smart-accounts.gemspec'
    - 'test-ledger/**/*'
    - 'vendor/**/*'

Layout/LineLength:
  Max: 120
  Exclude:
    - 'test/**/*_test.rb'

Metrics/ParameterLists:
  Enabled: false

Metrics/MethodLength:
  Max: 25
  Exclude:
    - 'test/**/*_test.rb'

# Composers enumerate one account declaration and one index resolution per
# on-chain account, plus one kwarg per IDL arg field; the default of 17 flags
# that enumeration, not complexity. 25 fits the largest IDL instruction
# (addSpendingLimit: 9 args + 6 accounts) while still catching real branching.
Metrics/AbcSize:
  Max: 25
  Exclude:
    - 'test/**/*_test.rb'

# Program classes grow by one send-and-sign + compose method pair per IDL
# instruction; length reflects program surface area, not complexity.
Metrics/ClassLength:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - 'test/**/*_test.rb'

Naming/AccessorMethodName:
  Enabled: false

# Require Ruby 3.1+ hash value omission (foo: foo → foo:) wherever possible.
Style/HashSyntax:
  EnforcedShorthandSyntax: always

# Align hash values in a column (table style) for multi-line hash literals.
Layout/HashAlignment:
  EnforcedColonStyle: table

# Enforce column alignment of consecutive `=` assignments.
Layout/ExtraSpacing:
  ForceEqualSignAlignment: true

# Prefer `extend self` over `module_function` for module-level helpers.
Style/ModuleFunction:
  EnforcedStyle: extend_self
